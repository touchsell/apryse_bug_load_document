<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="initial-scale=1, maximum-scale=1, user-scalable=no, width=device-width, viewport-fit=cover"
    />
    <meta name="google" content="notranslate" />
    <style>
      #toolbar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 1.5em;
      }
      #pdftron-webviewer {
        position: absolute;
        top: 1.5em;
        left: 0;
        right: 0;
        bottom: 0;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <button id="button-close">Close Document</button>
      <button id="button-load-document-1">Load Document 1</button>
      <button id="button-load-document-2">Load Document 2</button>
    </div>
    <div id="pdftron-webviewer" class="pdftron-webviewer--disabled"></div>
  </body>
</html>
